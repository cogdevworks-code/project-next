<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0b3d2e">
<title>Project Next — 면접 코치</title>
<style>
  :root{
    --bg:#0f1417; --bg2:#131a1f; --panel:#171f25; --panel2:#1e272e; --panel3:#243038;
    --line:#28343c; --line2:#33424b; --txt:#eaf1f3; --txt2:#c3cfd5; --dim:#8a9aa3;
    --accent:#2dd4a7; --accent-d:#1cae86; --accent-soft:#103027;
    --amber:#e3b765; --amber-soft:#2a2314; --warn:#ec8b7e; --warn-soft:#2c1a17; --good:#56d364;
    --blue:#6aa6ff;
    --shadow:0 6px 22px rgba(0,0,0,.28); --shadow-sm:0 2px 8px rgba(0,0,0,.18);
    --r:16px; --r-sm:10px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:smooth;}
  html,body{margin:0; background:
      radial-gradient(1200px 600px at 50% -10%, #16242a 0%, var(--bg) 55%) fixed;
      color:var(--txt);
    font-family:"Pretendard","Pretendard Variable","Apple SD Gothic Neo","Malgun Gothic","맑은 고딕",system-ui,-apple-system,sans-serif;
    font-size:16px; line-height:1.62; -webkit-font-smoothing:antialiased; letter-spacing:.1px;}
  body{padding-bottom:84px;}
  a{color:var(--accent); text-decoration:none;}
  .wrap{max-width:720px; margin:0 auto; padding:14px 16px 28px;}

  /* header */
  header{position:sticky; top:0; z-index:20;
    background:linear-gradient(180deg, rgba(15,20,23,.96), rgba(15,20,23,.86)); backdrop-filter:saturate(140%) blur(10px);
    border-bottom:1px solid var(--line);}
  .hrow{display:flex; align-items:center; gap:10px; padding:11px 16px; max-width:720px; margin:0 auto;}
  .brand{font-weight:800; font-size:15.5px; letter-spacing:-.2px; color:var(--txt);
    display:flex; align-items:center; gap:7px;}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);}
  .seg{display:flex; gap:4px; margin-left:auto; background:var(--panel2); border:1px solid var(--line);
    border-radius:999px; padding:4px;}
  .seg button{border:0; background:transparent; color:var(--dim); font-weight:700; padding:7px 14px;
    border-radius:999px; font-size:13px; cursor:pointer; transition:.18s;}
  .seg button.on{background:var(--accent); color:#06241b; box-shadow:var(--shadow-sm);}
  .meta{font-size:12px; color:var(--dim); padding:0 16px 9px; max-width:720px; margin:0 auto; line-height:1.5;}
  .meta b{color:var(--amber); font-weight:700;}

  /* bottom nav */
  nav{position:fixed; bottom:0; left:0; right:0; z-index:30;
    background:linear-gradient(180deg, rgba(23,31,37,.92), rgba(19,26,31,.98)); backdrop-filter:blur(10px);
    border-top:1px solid var(--line); display:flex; justify-content:space-around;
    padding:7px 4px calc(8px + env(safe-area-inset-bottom));}
  nav button{flex:1; border:0; background:transparent; color:var(--dim); font-size:10px; font-weight:700;
    display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; padding:5px 2px; border-radius:12px; transition:.16s;}
  nav button .ic{font-size:19px; line-height:1; filter:grayscale(.4) opacity(.8); transition:.16s;}
  nav button.on{color:var(--accent);}
  nav button.on .ic{filter:none; transform:translateY(-1px);}

  /* cards / panels */
  .panel{background:linear-gradient(180deg,var(--panel),var(--panel) 60%, #151c21);
    border:1px solid var(--line); border-radius:var(--r); padding:17px 17px; margin:13px 0; box-shadow:var(--shadow-sm);}
  .q{font-weight:800; font-size:17.5px; line-height:1.4; color:#fff; margin:0 0 6px; letter-spacing:-.2px;}
  .persona{display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:800; color:var(--amber);
    border:1px solid #4b3d1d; background:var(--amber-soft); border-radius:999px; padding:3px 11px; margin-bottom:9px; letter-spacing:.2px;}
  .lbl{font-size:10.5px; font-weight:800; letter-spacing:1.1px; color:var(--dim); margin:14px 0 6px; text-transform:uppercase;}
  .ans{background:var(--panel2); border:1px solid var(--line); border-left:3px solid var(--accent);
    border-radius:var(--r-sm); padding:12px 14px; white-space:pre-wrap; color:var(--txt2); line-height:1.66;}
  .ans.en{border-left-color:var(--blue);}
  .why{background:linear-gradient(180deg,#1c2620,#19221d); border:1px solid #2c4034; border-left:3px solid var(--amber);
    border-radius:var(--r-sm); padding:12px 14px; color:#ece3cd; line-height:1.6;}
  .skel{display:flex; flex-wrap:wrap; gap:7px;}
  .skel span{background:var(--accent-soft); border:1px solid #1f5544; color:#8df0cd; border-radius:999px;
    padding:5px 12px; font-size:13px; font-weight:700;}
  .donot{background:linear-gradient(180deg,#271715,#22130f); border:1px solid #4a2b25; border-left:3px solid var(--warn);
    border-radius:var(--r-sm); padding:12px 14px; color:#f2ccc4;}

  /* buttons */
  .btn{border:0; border-radius:12px; padding:11px 16px; font-weight:800; font-size:14px; cursor:pointer; transition:.16s; letter-spacing:.2px;}
  .btn:active{transform:translateY(1px);}
  .btn.p{background:linear-gradient(180deg,var(--accent),var(--accent-d)); color:#06241b; box-shadow:0 4px 14px rgba(45,212,167,.22);}
  .btn.s{background:var(--panel3); color:var(--txt); border:1px solid var(--line2);}
  .btn.w{background:var(--warn-soft); color:#f2ccc4; border:1px solid #4a2b25;}
  .row{display:flex; gap:9px; flex-wrap:wrap; align-items:center;}
  .spacer{flex:1;}
  .pill{font-size:12px; color:var(--dim);}
  .tts{background:var(--accent-soft); border:1px solid #1f5544; color:var(--accent); border-radius:999px;
    padding:6px 13px; font-weight:700; cursor:pointer; font-size:12.5px; transition:.16s;}
  .tts:active{transform:translateY(1px);}
  .nav2{display:flex; gap:9px; align-items:center; margin-top:12px; flex-wrap:wrap;}
  .count{color:var(--dim); font-size:12.5px; font-weight:600;}

  /* flashcard rating */
  .rate{display:flex; gap:9px; margin-top:14px;}
  .rate button{flex:1; padding:13px 0; border-radius:12px; font-weight:800; border:0; cursor:pointer; font-size:14px; transition:.16s;}
  .rate button:active{transform:translateY(1px);}
  .r1{background:#3a211d; color:#f4b4ab; border:1px solid #5a322b;}
  .r2{background:#3a3119; color:#f1dc9c; border:1px solid #5a4b27;}
  .r3{background:#143a2b; color:#8ff0c4; border:1px solid #1f6048;}
  .face{min-height:130px;}
  .hidden{display:none!important;}
  .big{font-size:18px; line-height:1.7;}

  /* cloze trainer */
  .cloze{background:var(--panel2); border-radius:var(--r-sm); padding:14px; font-size:18px; line-height:1.9;}
  .cloze .blank{display:inline-block; min-width:2.6em; border-bottom:2px solid var(--accent); color:transparent; margin:0 1px;}
  .cloze .kw{color:var(--accent); font-weight:800;}
  .chunk{margin:11px 0; padding:13px 15px; background:var(--panel2); border-radius:var(--r-sm); border-left:3px solid var(--accent); box-shadow:var(--shadow-sm);}
  .chunk .ck{font-size:10.5px; color:var(--amber); font-weight:800; text-transform:uppercase; letter-spacing:.8px; margin-bottom:4px;}
  .chunk .ctext{line-height:1.8; font-size:16.5px;}

  /* inputs */
  input,select,textarea{font-family:inherit; font-size:15px; background:var(--panel2); color:var(--txt);
    border:1px solid var(--line2); border-radius:var(--r-sm); padding:10px 12px; width:100%; transition:.15s;}
  input:focus,select:focus,textarea:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(45,212,167,.15);}
  textarea{min-height:92px; resize:vertical; line-height:1.6;}
  label.fl{font-size:12px; color:var(--dim); font-weight:700; display:block; margin:12px 0 4px;}
  input[type=range]{accent-color:var(--accent); padding:0;}

  /* facts / dashboard */
  .fact{display:flex; justify-content:space-between; gap:12px; padding:10px 0; border-bottom:1px solid var(--line);}
  .fact:last-child{border-bottom:0;}
  .fact .k{color:var(--dim); font-size:13px;} .fact .v{font-weight:700; text-align:right; color:var(--txt2);}
  .fact .v.todo{color:var(--amber);}
  .dash{display:grid; grid-template-columns:1fr 1fr; gap:11px;}
  .stat{background:var(--panel2); border:1px solid var(--line); border-radius:var(--r-sm); padding:16px; text-align:center;}
  .stat .n{font-size:30px; font-weight:800; color:var(--accent); letter-spacing:-.5px;}
  .stat .l{font-size:12px; color:var(--dim); margin-top:2px;}
  .bar{height:9px; background:var(--panel3); border-radius:999px; overflow:hidden; margin-top:7px;}
  .bar i{display:block; height:100%; background:linear-gradient(90deg,var(--accent-d),var(--accent)); border-radius:999px; transition:width .4s;}

  /* loop / audio */
  .loopbig{font-size:21px; line-height:1.75; text-align:center; padding:20px 10px; min-height:150px;
    display:flex; align-items:center; justify-content:center; color:var(--txt2);
    background:var(--panel2); border:1px solid var(--line); border-radius:var(--r-sm); margin:10px 0;}
  audio{filter:saturate(.9) brightness(1.02);}

  .small{font-size:12px; color:var(--dim); line-height:1.55;}
  h3{margin:4px 0 2px; font-size:17px; letter-spacing:-.2px;}
  .editrow{margin:9px 0;}
  details{background:var(--panel2); border:1px solid var(--line); border-radius:var(--r-sm); padding:10px 14px; margin:9px 0;}
  summary{cursor:pointer; font-weight:700; color:var(--txt2);}
  summary::marker{color:var(--accent);}

  .toast{position:fixed; bottom:96px; left:50%; transform:translateX(-50%) translateY(8px); background:#06241b; color:var(--accent);
    border:1px solid var(--accent); padding:10px 18px; border-radius:999px; font-weight:700; z-index:50; opacity:0;
    transition:.22s; pointer-events:none; box-shadow:var(--shadow); font-size:13.5px;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  ::-webkit-scrollbar{width:9px;height:9px;} ::-webkit-scrollbar-thumb{background:var(--line2); border-radius:999px;}
  @media (max-width:480px){ .q{font-size:16.5px;} .wrap{padding:12px 13px 24px;} }


  #gate{position:fixed; inset:0; z-index:200; background:radial-gradient(900px 500px at 50% -10%, #16242a, #0f1417 60%);
    display:flex; align-items:center; justify-content:center; padding:24px;}
  #gate .box{width:100%; max-width:340px; text-align:center;}
  #gate .logo{font-size:22px; font-weight:800; color:var(--txt); display:flex; gap:8px; align-items:center; justify-content:center; margin-bottom:6px;}
  #gate .logo .dot{width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent);}
  #gate p{color:var(--dim); font-size:13px; margin:2px 0 18px;}
  #gate input{text-align:center; font-size:17px; letter-spacing:1px; padding:13px;}
  #gate .err{color:var(--warn); font-size:12.5px; min-height:18px; margin:8px 0 0;}
  #gate label{display:flex; gap:7px; align-items:center; justify-content:center; color:var(--dim); font-size:12.5px; margin-top:12px;}
  #gate label input{width:auto; padding:0;}
  #app.locked{filter:blur(8px); pointer-events:none;}

</style>
</head>
<body>

<div id="gate"><div class="box">
  <div class="logo"><span class="dot"></span>Project Next</div>
  <p>비공개 면접 코치 · 비밀번호를 입력하세요</p>
  <input id="gpass" type="password" inputmode="text" autocomplete="off" placeholder="비밀번호" />
  <div class="err" id="gerr"></div>
  <button class="btn p" id="gbtn" style="width:100%; margin-top:14px">잠금 해제</button>
  <label><input type="checkbox" id="gremember" checked> 이 기기에서 기억</label>
</div></div>
<header>
  <div class="hrow">
    <span class="brand"><span class="dot"></span>Project Next</span>
    <div class="seg" id="coSeg"></div>
  </div>
  <div class="meta" id="metaBar"></div>
</header>

<div class="wrap" id="view"></div>

<nav id="nav"></nav>
<div class="toast" id="toast"></div>

/* ===== 클라우드 동기 (Firestore REST, passphrase-keyed, 암호화 blob) ===== */
const FB={apiKey:"AIzaSyB7sCrlSegcQqRFDt2TZ0ZUH9xOzcuCa5A",projectId:"project-next-1dfad"};
let _stateKey=null,_docId=null,_syncReady=false,_pushTimer=null;
async function _sha256hex(s){const h=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));return [...new Uint8Array(h)].map(b=>b.toString(16).padStart(2,"0")).join("");}
function _b64(buf){return btoa(String.fromCharCode(...new Uint8Array(buf)));}
function _unb64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}
async function cloudInit(pass){
  try{
    const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pass),"PBKDF2",false,["deriveKey"]);
    _stateKey=await crypto.subtle.deriveKey({name:"PBKDF2",salt:new TextEncoder().encode("pn-sync-salt-v1"),iterations:100000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);
    _docId=await _sha256hex("pn|"+pass);
    _syncReady=true;
  }catch(e){ console.warn("cloudInit",e); _syncReady=false; }
}
function _docUrl(){ return `https://firestore.googleapis.com/v1/projects/${FB.projectId}/databases/(default)/documents/vaults/${_docId}?key=${FB.apiKey}`; }
async function _encState(obj){
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv},_stateKey,new TextEncoder().encode(JSON.stringify(obj)));
  return JSON.stringify({i:_b64(iv),c:_b64(ct)});
}
async function _decState(str){
  const o=JSON.parse(str);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:_unb64(o.i)},_stateKey,_unb64(o.c));
  return JSON.parse(new TextDecoder().decode(pt));
}
async function cloudPull(){
  if(!_syncReady)return;
  try{
    const r=await fetch(_docUrl());
    if(!r.ok)return;
    const j=await r.json();
    const blob=j.fields&&j.fields.blob&&j.fields.blob.stringValue;
    const ts=j.fields&&j.fields.ts?Number(j.fields.ts.integerValue||0):0;
    if(blob && ts>(state._ts||0)){ const cloud=await _decState(blob); state=cloud; saveLocalOnly(); }
  }catch(e){ console.warn("cloudPull",e); }
}
async function cloudPush(){
  if(!_syncReady)return;
  try{
    state._ts=Date.now(); saveLocalOnly();
    const blob=await _encState(state);
    const body={fields:{blob:{stringValue:blob},ts:{integerValue:String(state._ts)}}};
    await fetch(_docUrl(),{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  }catch(e){ console.warn("cloudPush",e); }
}
function cloudPushDebounced(){ if(_pushTimer)clearTimeout(_pushTimer); _pushTimer=setTimeout(cloudPush,1200); }

function pickVoice(lang){
  const want = lang==="en" ? ["en-US","en_GB","en"] : ["ko-KR","ko"];
  for(const w of want){ const v=voices.find(v=>v.lang&&v.lang.toLowerCase().startsWith(w.toLowerCase().slice(0,2))); if(v)return v; }
  return null;
}
function speak(text, lang="ko", rate=1, cb){
  if(!('speechSynthesis' in window)){ toast("이 브라우저는 음성 미지원"); cb&&cb(); return; }
  const u=new SpeechSynthesisUtterance(text);
  const v=pickVoice(lang); if(v)u.voice=v; u.lang= lang==="en"?"en-US":"ko-KR"; u.rate=rate;
  u.onend=()=>{ cb&&cb(); };
  u.onerror=()=>{ cb&&cb(); };
  speechSynthesis.speak(u);
}

function renderCloze(text, level){
  if(level===0) return text;
  // split into words; keep first char(s) as keyword hint at level1, blanks at level2
  return text.split(/(\s+)/).map(tok=>{
    if(/^\s+$/.test(tok)) return tok;
    const clean=tok.replace(/[.,!?"'·…”“]/g,"");
    if(clean.length<=1) return tok;
    if(level===1){ // keyword: show ~40% words fully (nouns-ish longer words), blank rest lightly
      if(clean.length>=4 && Math.random()<0.0) {} // deterministic below
      return tok; // level1 handled via keyword highlight instead
    }
    return `<span class="blank">${" ".repeat(Math.min(clean.length,6))}</span>${tok.slice(clean.length)}`;
  }).join("");
}
// deterministic keyword version: highlight long tokens, dim others
function renderClozeKeyword(text){
  return text.split(/(\s+)/).map(tok=>{
    if(/^\s+$/.test(tok))return tok; const clean=tok.replace(/[^가-힣A-Za-z0-9]/g,"");
    if(clean.length>=3) return `<span class="kw">${tok}</span>`;
    return `<span style="opacity:.35">${tok}</span>`;
  }).join("");
}

/* ---------- 플래시카드 (Leitner) ---------- */
function dueCards(){
  const today=todayNum();
  return cards().map((c,i)=>({c,i})).filter(x=>{ const s=state.srs[cardId(x.i)]; return !s || (s.due||0)<=today; });
}
function todayNum(){ return Math.floor(Date.now()/86400000); }
function rCards(){
  const v=$("#view");
  let pool = dueCards(); if(pool.length===0) pool = cards().map((c,i)=>({c,i}));
  state.cardPtr = (state.cardPtr||0) % pool.length;
  const {c,i}=pool[state.cardPtr];
  state.flip = state.flip||false;
  const due=dueCards().length;
  const wrap=document.createElement("div"); wrap.className="panel";
  wrap.innerHTML=`<div class="row"><span class="persona">${c.p}</span><span class="spacer"></span><span class="count">복습 대기 ${due} · ${state.cardPtr+1}/${pool.length}</span></div>
    <div class="q" style="margin-top:6px">${cf(i,"q")}</div>
    <div class="face">${ state.flip ? `
        <div class="lbl">모델답</div><div class="ans">${cf(i,"full")}</div>
        ${state.co==="mitech"&&cf(i,"fullen")?`<div class="ans en" style="margin-top:6px">${cf(i,"fullen")}</div>`:""}
        <div class="lbl">골격</div><div class="skel">${(cf(i,"skel")||[]).map(s=>`<span>${s}</span>`).join("")}</div>
      ` : `<div class="big" style="color:var(--dim); padding:18px 0">질문을 보고 <b style="color:var(--accent)">소리내어</b> 답해보세요.<br>그다음 카드를 뒤집어 비교 →</div>` }</div>
    ${ state.flip? `<div class="rate">
        <button class="r1" data-q="0">다시 ↺</button>
        <button class="r2" data-q="1">애매</button>
        <button class="r3" data-q="2">완벽 ✓</button></div>`
      : `<div class="nav2"><button class="btn p" id="flipBtn">카드 뒤집기</button>
         <button class="tts" id="ttsQ">🔊 질문</button></div>`}`;
  v.appendChild(wrap);
  if(!state.flip){ $("#flipBtn").onclick=()=>{state.flip=true; saveState(); rCards();}; $("#ttsQ").onclick=()=>{stopSpeak();speak(cf(i,"q"),"ko");}; }
  else{
    wrap.querySelectorAll(".rate button").forEach(b=>b.onclick=()=>{ grade(i, +b.dataset.q); state.flip=false; state.cardPtr++; saveState(); rCards(); });
  }
  const info=document.createElement("div"); info.className="panel small";
  info.innerHTML=`능동 인출 + 간격 반복(Leitner). <b>완벽</b>은 더 길게, <b>다시</b>는 곧 다시 나옵니다. 면접 전엔 '복습 대기'를 0으로.`;
  v.appendChild(info);
}
function grade(i,q){
  const id=cardId(i); const s=state.srs[id]||{box:0,seen:0};
  s.seen++;
  if(q===0) s.box=0; else if(q===1) s.box=Math.max(0,s.box); else s.box=Math.min(5,s.box+1);
  const gaps=[0,1,2,4,7,14]; s.due=todayNum()+ (q===0?0:gaps[s.box]);
  s.last=q; state.srs[id]=s; saveState();
}

/* ---------- 세뇌 (오디오 루프) ---------- */
let loopOn=false, loopItems=[], loopPtr=0;
function rLoop(){
  const v=$("#view");
  state.loopLang=state.loopLang||"ko"; state.loopRate=state.loopRate||1; state.loopGap=state.loopGap||0.6;
  let mp3="audio/"+state.co+"_ko.mp3"; if(state.co==="mitech"&&state.loopLang==="en") mp3="audio/mitech_en.mp3";
  const panel=document.createElement("div"); panel.className="panel";
  panel.innerHTML=`<div class="row"><b>🎧 세뇌 모드 (자동 반복 듣기)</b></div>
    <div class="small" style="margin:6px 0">자기소개 + 핵심답변의 <b>간단버전(골격)</b>을 연속 재생·무한 반복합니다. 흘려들으며 세뇌하세요.</div>
    <label class="fl">언어</label>
    <select id="lLang"><option value="ko" ${state.loopLang==="ko"?"selected":""}>한국어</option>
      ${state.co==="mitech"?`<option value="en" ${state.loopLang==="en"?"selected":""}>English</option><option value="koen" ${state.loopLang==="koen"?"selected":""}>한국어→English</option>`:""}</select>
    <label class="fl">속도: <span id="rateV">${state.loopRate}</span>x</label>
    <input type="range" id="lRate" min="0.6" max="1.4" step="0.1" value="${state.loopRate}" style="width:100%">
    <div class="loopbig" id="loopText">⏸ 정지됨</div>
    <div class="row"><button class="btn p" id="loopToggle" style="flex:1">▶ 재생</button></div>
    <div class="small" style="margin-top:8px">⚠️ 위 자동재생(TTS)은 폰 화면 꺼지면 멈출 수 있어요. <b>통근·잠금화면용은 아래 MP3</b>를 쓰세요.</div>
    <div class="lbl" style="margin-top:14px">🎵 MP3 (잠금화면·통근용 — 무한반복)</div>
    <audio id="mp3p" controls loop preload="none" style="width:100%; margin-top:4px" src="${mp3}"></audio>
    <div class="small" style="margin-top:4px">${state.co==="mitech"?"엠아이텍":"디노티시아"} · ${state.loopLang==="en"?"English":"한국어"} 트랙 · 실제 음성파일이라 화면 꺼도 재생(호스팅 링크에서). 파일 단독 사용 시엔 audio 폴더 필요.</div>`;
  v.appendChild(panel);
  $("#lLang").onchange=e=>{state.loopLang=e.target.value;saveState();rLoop();};
  $("#lRate").oninput=e=>{state.loopRate=+e.target.value; $("#rateV").textContent=state.loopRate; saveState();};
  $("#loopToggle").onclick=()=>{ if(loopOn){ stopLoop(); } else { startLoop(); } };
}
function buildLoopItems(){
  const items=[]; const lang=state.loopLang;
  const introTxt = curData().intro.chunks.map(c=> lang==="en"&&c.en?c.en:c.t).join(" ");
  items.push({t:introTxt, l: lang==="en"?"en":"ko", label:"자기소개"});
  cards().forEach((c,i)=>{
    if(lang==="en"||lang==="koen"){
      const ke=cf(i,"simpleen"); if(ke){ if(lang!=="en") items.push({t:cf(i,"simple"),l:"ko",label:cf(i,"q")}); items.push({t:ke,l:"en",label:cf(i,"q")}); return; }
    }
    items.push({t:cf(i,"simple"),l:"ko",label:cf(i,"q")});
  });
  return items;
}
function startLoop(){
  loopItems=buildLoopItems(); loopPtr=0; loopOn=true;
  $("#loopToggle").textContent="⏸ 정지";
  playLoopStep();
}
function stopLoop(){ loopOn=false; stopSpeak(); const b=$("#loopToggle"); if(b)b.textContent="▶ 재생"; const t=$("#loopText"); if(t)t.textContent="⏸ 정지됨"; }
function playLoopStep(){
  if(!loopOn) return;
  if(loopPtr>=loopItems.length) loopPtr=0;
  const it=loopItems[loopPtr];
  const tx=$("#loopText"); if(tx) tx.textContent=it.t;
  speak(it.t, it.l, state.loopRate, ()=>{
    if(!loopOn)return;
    loopPtr++;
    setTimeout(()=>playLoopStep(), (state.loopGap||0.6)*1000);
  });
}

/* ---------- recording ---------- */
let mediaRec=null, chunksRec=[];
function setupRec(btn){
  if(!btn) return;
  btn.onclick=async()=>{
    if(mediaRec && mediaRec.state==="recording"){ mediaRec.stop(); btn.textContent="🎙️ 녹음"; return; }
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      mediaRec=new MediaRecorder(stream); chunksRec=[];
      mediaRec.ondataavailable=e=>chunksRec.push(e.data);
      mediaRec.onstop=()=>{ const blob=new Blob(chunksRec,{type:"audio/webm"}); const url=URL.createObjectURL(blob);
        let au=$("#myrec"); if(!au){ au=document.createElement("audio"); au.id="myrec"; au.controls=true; au.style="width:100%;margin-top:8px"; btn.parentNode.appendChild(au);} au.src=url;
        stream.getTracks().forEach(t=>t.stop()); };
      mediaRec.start(); btn.textContent="⏹ 정지";
    }catch(e){ toast("마이크 권한 필요"); }
  };
}


/* ===== 잠금/복호화 ===== */
const ENC_b64=(b)=>Uint8Array.from(atob(b),c=>c.charCodeAt(0));
async function _deriveKey(pass){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pass),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt:ENC_b64(ENC.s),iterations:100000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
}
async function _tryUnlock(pass){
  try{
    const key=await _deriveKey(pass);
    const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:ENC_b64(ENC.i)},key,ENC_b64(ENC.c));
    DATA=JSON.parse(new TextDecoder().decode(pt));
    return true;
  }catch(e){ return false; }
}
async function _unlock(pass, remember){
  const ok=await _tryUnlock(pass);
  if(!ok){ const e=document.getElementById("gerr"); if(e)e.textContent="비밀번호가 올바르지 않습니다."; return; }
  if(remember){ try{localStorage.setItem("pn_pass",pass);}catch(_){} }
  if(typeof afterUnlock==="function"){ try{ await afterUnlock(pass); }catch(e){ console.warn(e); } }
  const g=document.getElementById("gate"); if(g)g.remove();
  render();
}
async function boot(){
  const saved=(()=>{try{return localStorage.getItem("pn_pass")}catch(_){return null}})();
  if(saved && await _tryUnlock(saved)){ if(typeof afterUnlock==="function"){ try{ await afterUnlock(saved); }catch(e){ console.warn(e); } } const g=document.getElementById("gate"); if(g)g.remove(); render(); return; }
  const btn=document.getElementById("gbtn"), inp=document.getElementById("gpass");
  if(btn) btn.onclick=()=>_unlock(inp.value, document.getElementById("gremember").checked);
  if(inp) inp.onkeydown=(e)=>{ if(e.key==="Enter") _unlock(inp.value, document.getElementById("gremember").checked); };
  if(inp) inp.focus();
}
boot();
