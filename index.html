<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0b3d2e">
<title>면접 코치 — 유희찬</title>
<style>
  :root{ --bg:#0e1512; --panel:#15201b; --panel2:#1b2a23; --line:#2a3b32; --txt:#e8efe9; --dim:#9fb0a6;
         --accent:#21c08a; --accent2:#c8a24a; --warn:#e0796b; --good:#3fb950; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; background:var(--bg); color:var(--txt);
    font-family:"Pretendard","Malgun Gothic","맑은 고딕",system-ui,sans-serif; font-size:16px; line-height:1.55;}
  body{padding-bottom:78px;}
  a{color:var(--accent);}
  .wrap{max-width:760px; margin:0 auto; padding:12px 14px;}
  header{position:sticky; top:0; z-index:20; background:linear-gradient(#0e1512,#0e1512f0);
    backdrop-filter:blur(6px); border-bottom:1px solid var(--line);}
  .hrow{display:flex; align-items:center; gap:8px; padding:9px 14px; max-width:760px; margin:0 auto;}
  .brand{font-weight:800; color:var(--accent); font-size:15px; letter-spacing:.3px;}
  .seg{display:flex; gap:6px; margin-left:auto; background:var(--panel); border:1px solid var(--line);
    border-radius:10px; padding:3px;}
  .seg button{border:0; background:transparent; color:var(--dim); font-weight:700; padding:6px 11px;
    border-radius:8px; font-size:13px; cursor:pointer;}
  .seg button.on{background:var(--accent); color:#06150f;}
  .meta{font-size:12px; color:var(--dim); padding:0 14px 8px; max-width:760px; margin:0 auto;}
  .meta b{color:var(--accent2);}
  /* bottom nav */
  nav{position:fixed; bottom:0; left:0; right:0; z-index:30; background:var(--panel); border-top:1px solid var(--line);
    display:flex; justify-content:space-around; padding:6px 4px calc(6px + env(safe-area-inset-bottom));}
  nav button{flex:1; border:0; background:transparent; color:var(--dim); font-size:10.5px; font-weight:700;
    display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; padding:4px 2px;}
  nav button .ic{font-size:18px;}
  nav button.on{color:var(--accent);}
  /* cards / panels */
  .panel{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:15px; margin:12px 0;}
  .q{font-weight:800; font-size:17px; color:#fff; margin:0 0 4px;}
  .persona{display:inline-block; font-size:11px; font-weight:700; color:var(--accent2);
    border:1px solid #4a3f23; background:#241d10; border-radius:20px; padding:1px 9px; margin-bottom:7px;}
  .lbl{font-size:11px; font-weight:800; letter-spacing:.6px; color:var(--dim); margin:12px 0 4px; text-transform:uppercase;}
  .ans{background:var(--panel2); border-left:3px solid var(--accent); border-radius:8px; padding:10px 12px; white-space:pre-wrap;}
  .ans.en{border-left-color:#5b8def;}
  .why{background:#16231d; border-left:3px solid var(--accent2); border-radius:8px; padding:10px 12px; color:#e9e2cf;}
  .skel{display:flex; flex-wrap:wrap; gap:6px;}
  .skel span{background:#10241b; border:1px solid #2c5e47; color:#7fe3bd; border-radius:18px; padding:3px 10px; font-size:13px; font-weight:700;}
  .donot{background:#241312; border-left:3px solid var(--warn); border-radius:8px; padding:10px 12px; color:#f0c8c1;}
  .btn{border:0; border-radius:10px; padding:10px 14px; font-weight:800; font-size:14px; cursor:pointer;}
  .btn.p{background:var(--accent); color:#06150f;} .btn.s{background:var(--panel2); color:var(--txt); border:1px solid var(--line);}
  .btn.w{background:#3a2420; color:#f0c8c1; border:1px solid #5b3a33;}
  .row{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
  .spacer{flex:1;}
  .pill{font-size:12px; color:var(--dim);}
  .tts{background:transparent; border:1px solid var(--line); color:var(--accent); border-radius:8px; padding:4px 9px; font-weight:700; cursor:pointer; font-size:12px;}
  .nav2{display:flex; gap:8px; align-items:center; margin-top:10px;}
  .count{color:var(--dim); font-size:13px;}
  .rate{display:flex; gap:8px; margin-top:12px;}
  .rate button{flex:1; padding:11px 0; border-radius:10px; font-weight:800; border:0; cursor:pointer;}
  .r1{background:#3a2420; color:#f3b4ab;} .r2{background:#3a3320; color:#f0dca0;} .r3{background:#173a2a; color:#8ff0c2;}
  .face{min-height:120px;}
  .hidden{display:none!important;}
  .big{font-size:19px; line-height:1.7;}
  .cloze{background:var(--panel2); border-radius:10px; padding:14px; font-size:18px; line-height:1.85;}
  .cloze .blank{color:#06150f; background:var(--accent); border-radius:4px; padding:0 4px; font-weight:800;}
  .cloze .kw{color:var(--accent); font-weight:800;}
  .chunk{margin:10px 0; padding:10px 12px; background:var(--panel2); border-radius:10px; border-left:3px solid var(--accent);}
  .chunk .ck{font-size:11px; color:var(--accent2); font-weight:800; text-transform:uppercase; letter-spacing:.5px;}
  input,select,textarea{font-family:inherit; font-size:15px; background:var(--panel2); color:var(--txt);
    border:1px solid var(--line); border-radius:8px; padding:8px 10px; width:100%;}
  textarea{min-height:90px; resize:vertical;}
  label.fl{font-size:12px; color:var(--dim); font-weight:700; display:block; margin:10px 0 3px;}
  .fact{display:flex; justify-content:space-between; gap:10px; padding:8px 0; border-bottom:1px solid var(--line);}
  .fact .k{color:var(--dim); font-size:13px;} .fact .v{font-weight:700; text-align:right;}
  .fact .v.todo{color:var(--accent2);}
  .dash{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .stat{background:var(--panel2); border-radius:12px; padding:14px; text-align:center;}
  .stat .n{font-size:28px; font-weight:800; color:var(--accent);}
  .stat .l{font-size:12px; color:var(--dim);}
  .bar{height:8px; background:var(--panel2); border-radius:6px; overflow:hidden; margin-top:6px;}
  .bar i{display:block; height:100%; background:var(--accent);}
  .toast{position:fixed; bottom:88px; left:50%; transform:translateX(-50%); background:#06150f; color:var(--accent);
    border:1px solid var(--accent); padding:9px 16px; border-radius:24px; font-weight:700; z-index:50; opacity:0; transition:.2s; pointer-events:none;}
  .toast.show{opacity:1;}
  .loopbig{font-size:22px; line-height:1.7; text-align:center; padding:18px 8px; min-height:160px; display:flex; align-items:center; justify-content:center;}
  .small{font-size:12px; color:var(--dim);}
  h3{margin:6px 0 2px;}
  .editrow{margin:8px 0;}
  details{background:var(--panel2); border-radius:10px; padding:8px 12px; margin:8px 0;}
  summary{cursor:pointer; font-weight:700;}
  ::-webkit-scrollbar{width:8px;height:8px;} ::-webkit-scrollbar-thumb{background:var(--line); border-radius:8px;}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <span class="brand">🎯 면접 코치</span>
    <div class="seg" id="coSeg"></div>
  </div>
  <div class="meta" id="metaBar"></div>
</header>

<div class="wrap" id="view"></div>

<nav id="nav"></nav>
<div class="toast" id="toast"></div>

<script>
/* =========================================================================

 dnotitia: {

/* =================== 앱 로직 =================== */
const LS_KEY="ic_state_v1";
const $=(s,el=document)=>el.querySelector(s);
let state = loadState();
function loadState(){ try{return JSON.parse(localStorage.getItem(LS_KEY))||{}}catch(e){return{}} }
function saveState(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
state.co = state.co || "dnotitia";
state.mode = state.mode || "understand";
state.srs = state.srs || {};          // cardId -> {box, due, seen}
state.edits = state.edits || {};       // "co.cards.idx.field" -> value
state.idx = state.idx || {};           // per mode/co index
saveState();

function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),1500); }

/* edits overlay */
function ov(co, path, def){ const k=co+"."+path; return (k in state.edits)? state.edits[k] : def; }
function setOv(co, path, val){ state.edits[co+"."+path]=val; saveState(); }

function curData(){ return DATA[state.co]; }
function cards(){ return curData().cards; }
function cardId(i){ return state.co+"_"+i; }

/* ---------- TTS ---------- */
let voices=[];
function loadVoices(){ voices = speechSynthesis.getVoices(); }
if('speechSynthesis' in window){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }
let speakQueue=[], speaking=false;
function pickVoice(lang){
  const want = lang==="en" ? ["en-US","en_GB","en"] : ["ko-KR","ko"];
  for(const w of want){ const v=voices.find(v=>v.lang&&v.lang.toLowerCase().startsWith(w.toLowerCase().slice(0,2))); if(v)return v; }
  return null;
}
function speak(text, lang="ko", rate=1, cb){
  if(!('speechSynthesis' in window)){ toast("이 브라우저는 음성 미지원"); cb&&cb(); return; }
  const u=new SpeechSynthesisUtterance(text);
  const v=pickVoice(lang); if(v)u.voice=v; u.lang= lang==="en"?"en-US":"ko-KR"; u.rate=rate;
  u.onend=()=>{ cb&&cb(); };
  u.onerror=()=>{ cb&&cb(); };
  speechSynthesis.speak(u);
}
function stopSpeak(){ try{speechSynthesis.cancel();}catch(e){} loopOn=false; }

/* ---------- render shell ---------- */
const MODES=[
  {id:"understand", ic:"📖", name:"이해"},
  {id:"intro", ic:"🎤", name:"자기소개"},
  {id:"cards", ic:"🃏", name:"암기"},
  {id:"mock", ic:"🎬", name:"모의"},
  {id:"loop", ic:"🎧", name:"세뇌"},
  {id:"cheat", ic:"📋", name:"치트"},
  {id:"edit", ic:"✏️", name:"편집"},
];
function renderShell(){
  const seg=$("#coSeg"); seg.innerHTML="";
  for(const c of [["dnotitia","디노티시아"],["mitech","엠아이텍"]]){
    const b=document.createElement("button"); b.textContent=c[1]; if(state.co===c[0])b.className="on";
    b.onclick=()=>{ stopSpeak(); state.co=c[0]; saveState(); renderShell(); render(); };
    seg.appendChild(b);
  }
  $("#metaBar").innerHTML = curData().meta;
  const nav=$("#nav"); nav.innerHTML="";
  for(const m of MODES){
    const b=document.createElement("button"); if(state.mode===m.id)b.className="on";
    b.innerHTML=`<span class="ic">${m.ic}</span>${m.name}`;
    b.onclick=()=>{ stopSpeak(); state.mode=m.id; saveState(); render(); window.scrollTo(0,0); };
    nav.appendChild(b);
  }
}

function render(){
  renderShell();
  const v=$("#view"); v.innerHTML="";
  ({understand:rUnderstand, intro:rIntro, cards:rCards, mock:rMock, loop:rLoop, cheat:rCheat, edit:rEdit})[state.mode]();
}

/* helper to read card field with edits + lang */
function cf(i, field){ const c=cards()[i]; return ov(state.co, "cards."+i+"."+field, c[field]||""); }

  const lang = state.introLang;

  const levels=["전문 보기","키워드만","빈칸(인출)"];
  head.innerHTML=`<div class="row">
     <b>자기소개 트레이너</b><span class="spacer"></span>
     ${state.co==="mitech"?`<button class="btn s" id="langBtn">${lang==="ko"?"한국어":"English"}</button>`:""}
   </div>
   <div class="row" style="margin-top:8px">${levels.map((l,n)=>`<button class="btn ${state.introLevel===n?'p':'s'}" data-lv="${n}">${l}</button>`).join("")}</div>
   <div class="small" style="margin-top:8px">단계: 전문으로 이해 → 키워드 보고 채우기 → 빈칸에서 소리내어 인출. 청크 단위로 외우세요.</div>`;
  v.appendChild(head);
  chunks.forEach((c,i)=>{
    const txt = (lang==="en" && c.en)? c.en : c.t;
    const d=document.createElement("div"); d.className="chunk";
    d.innerHTML=`<div class="ck">${c.ck}</div><div class="ctext">${(state.introLevel===1?renderClozeKeyword(txt):renderCloze(txt, state.introLevel))}</div>`;
    v.appendChild(d);
  });
  const ctr=document.createElement("div"); ctr.className="panel row";
  ctr.innerHTML=`<button class="tts" id="playIntro">🔊 전체 듣기</button>
    <button class="btn s" id="recIntro">🎙️ 내 답 녹음</button><span class="spacer"></span>
    <span class="small">막히면 키워드 단계로</span>`;
  v.appendChild(ctr);
  head.querySelectorAll("[data-lv]").forEach(b=>b.onclick=()=>{ state.introLevel=+b.dataset.lv; saveState(); rIntro(); });
  const lb=$("#langBtn"); if(lb)lb.onclick=()=>{ state.introLang= lang==="ko"?"en":"ko"; saveState(); rIntro(); };
  $("#playIntro").onclick=()=>{ stopSpeak(); const full=chunks.map(c=>(lang==="en"&&c.en)?c.en:c.t).join(" "); speak(full, lang==="en"?"en":"ko"); };
  setupRec($("#recIntro"));
}
function renderCloze(text, level){
  if(level===0) return text;
  // split into words; keep first char(s) as keyword hint at level1, blanks at level2
  return text.split(/(\s+)/).map(tok=>{
    if(/^\s+$/.test(tok)) return tok;
    const clean=tok.replace(/[.,!?"'·…”“]/g,"");
    if(clean.length<=1) return tok;
    if(level===1){ // keyword: show ~40% words fully (nouns-ish longer words), blank rest lightly
      if(clean.length>=4 && Math.random()<0.0) {} // deterministic below
      return tok; // level1 handled via keyword highlight instead
    }
    return `<span class="blank">${" ".repeat(Math.min(clean.length,6))}</span>${tok.slice(clean.length)}`;
  }).join("");
}
// deterministic keyword version: highlight long tokens, dim others
function renderClozeKeyword(text){
  return text.split(/(\s+)/).map(tok=>{
    if(/^\s+$/.test(tok))return tok; const clean=tok.replace(/[^가-힣A-Za-z0-9]/g,"");
    if(clean.length>=3) return `<span class="kw">${tok}</span>`;
    return `<span style="opacity:.35">${tok}</span>`;
  }).join("");
}

/* ---------- 플래시카드 (Leitner) ---------- */
function dueCards(){
  const today=todayNum();
  return cards().map((c,i)=>({c,i})).filter(x=>{ const s=state.srs[cardId(x.i)]; return !s || (s.due||0)<=today; });
}
function todayNum(){ return Math.floor(Date.now()/86400000); }
function rCards(){
  const v=$("#view");
  let pool = dueCards(); if(pool.length===0) pool = cards().map((c,i)=>({c,i}));
  state.cardPtr = (state.cardPtr||0) % pool.length;
  const {c,i}=pool[state.cardPtr];
  state.flip = state.flip||false;
  const due=dueCards().length;
  const wrap=document.createElement("div"); wrap.className="panel";
  wrap.innerHTML=`<div class="row"><span class="persona">${c.p}</span><span class="spacer"></span><span class="count">복습 대기 ${due} · ${state.cardPtr+1}/${pool.length}</span></div>
    <div class="q" style="margin-top:6px">${cf(i,"q")}</div>
    <div class="face">${ state.flip ? `
        <div class="lbl">모델답</div><div class="ans">${cf(i,"full")}</div>
        ${state.co==="mitech"&&cf(i,"fullen")?`<div class="ans en" style="margin-top:6px">${cf(i,"fullen")}</div>`:""}
        <div class="lbl">골격</div><div class="skel">${(cf(i,"skel")||[]).map(s=>`<span>${s}</span>`).join("")}</div>
      ` : `<div class="big" style="color:var(--dim); padding:18px 0">질문을 보고 <b style="color:var(--accent)">소리내어</b> 답해보세요.<br>그다음 카드를 뒤집어 비교 →</div>` }</div>
    ${ state.flip? `<div class="rate">
        <button class="r1" data-q="0">다시 ↺</button>
        <button class="r2" data-q="1">애매</button>
        <button class="r3" data-q="2">완벽 ✓</button></div>`
      : `<div class="nav2"><button class="btn p" id="flipBtn">카드 뒤집기</button>
         <button class="tts" id="ttsQ">🔊 질문</button></div>`}`;
  v.appendChild(wrap);
  if(!state.flip){ $("#flipBtn").onclick=()=>{state.flip=true; saveState(); rCards();}; $("#ttsQ").onclick=()=>{stopSpeak();speak(cf(i,"q"),"ko");}; }
  else{
    wrap.querySelectorAll(".rate button").forEach(b=>b.onclick=()=>{ grade(i, +b.dataset.q); state.flip=false; state.cardPtr++; saveState(); rCards(); });
  }
  const info=document.createElement("div"); info.className="panel small";
  info.innerHTML=`능동 인출 + 간격 반복(Leitner). <b>완벽</b>은 더 길게, <b>다시</b>는 곧 다시 나옵니다. 면접 전엔 '복습 대기'를 0으로.`;
  v.appendChild(info);
}
function grade(i,q){
  const id=cardId(i); const s=state.srs[id]||{box:0,seen:0};
  s.seen++;
  if(q===0) s.box=0; else if(q===1) s.box=Math.max(0,s.box); else s.box=Math.min(5,s.box+1);
  const gaps=[0,1,2,4,7,14]; s.due=todayNum()+ (q===0?0:gaps[s.box]);
  s.last=q; state.srs[id]=s; saveState();
}

/* ---------- 세뇌 (오디오 루프) ---------- */
let loopOn=false, loopItems=[], loopPtr=0;
function rLoop(){
  const v=$("#view");
  state.loopLang=state.loopLang||"ko"; state.loopRate=state.loopRate||1; state.loopGap=state.loopGap||0.6;
  let mp3="audio/"+state.co+"_ko.mp3"; if(state.co==="mitech"&&state.loopLang==="en") mp3="audio/mitech_en.mp3";
  const panel=document.createElement("div"); panel.className="panel";
  panel.innerHTML=`<div class="row"><b>🎧 세뇌 모드 (자동 반복 듣기)</b></div>
    <div class="small" style="margin:6px 0">자기소개 + 핵심답변의 <b>간단버전(골격)</b>을 연속 재생·무한 반복합니다. 흘려들으며 세뇌하세요.</div>
    <label class="fl">언어</label>
    <select id="lLang"><option value="ko" ${state.loopLang==="ko"?"selected":""}>한국어</option>
      ${state.co==="mitech"?`<option value="en" ${state.loopLang==="en"?"selected":""}>English</option><option value="koen" ${state.loopLang==="koen"?"selected":""}>한국어→English</option>`:""}</select>
    <label class="fl">속도: <span id="rateV">${state.loopRate}</span>x</label>
    <input type="range" id="lRate" min="0.6" max="1.4" step="0.1" value="${state.loopRate}" style="width:100%">
    <div class="loopbig" id="loopText">⏸ 정지됨</div>
    <div class="row"><button class="btn p" id="loopToggle" style="flex:1">▶ 재생</button></div>
    <div class="small" style="margin-top:8px">⚠️ 위 자동재생(TTS)은 폰 화면 꺼지면 멈출 수 있어요. <b>통근·잠금화면용은 아래 MP3</b>를 쓰세요.</div>
    <div class="lbl" style="margin-top:14px">🎵 MP3 (잠금화면·통근용 — 무한반복)</div>
    <audio id="mp3p" controls loop preload="none" style="width:100%; margin-top:4px" src="${mp3}"></audio>
    <div class="small" style="margin-top:4px">${state.co==="mitech"?"엠아이텍":"디노티시아"} · ${state.loopLang==="en"?"English":"한국어"} 트랙 · 실제 음성파일이라 화면 꺼도 재생(호스팅 링크에서). 파일 단독 사용 시엔 audio 폴더 필요.</div>`;
  v.appendChild(panel);
  $("#lLang").onchange=e=>{state.loopLang=e.target.value;saveState();rLoop();};
  $("#lRate").oninput=e=>{state.loopRate=+e.target.value; $("#rateV").textContent=state.loopRate; saveState();};
  $("#loopToggle").onclick=()=>{ if(loopOn){ stopLoop(); } else { startLoop(); } };
}
function buildLoopItems(){
  const items=[]; const lang=state.loopLang;
  const introTxt = curData().intro.chunks.map(c=> lang==="en"&&c.en?c.en:c.t).join(" ");
  items.push({t:introTxt, l: lang==="en"?"en":"ko", label:"자기소개"});
  cards().forEach((c,i)=>{
    if(lang==="en"||lang==="koen"){
      const ke=cf(i,"simpleen"); if(ke){ if(lang!=="en") items.push({t:cf(i,"simple"),l:"ko",label:cf(i,"q")}); items.push({t:ke,l:"en",label:cf(i,"q")}); return; }
    }
    items.push({t:cf(i,"simple"),l:"ko",label:cf(i,"q")});
  });
  return items;
}
function startLoop(){
  loopItems=buildLoopItems(); loopPtr=0; loopOn=true;
  $("#loopToggle").textContent="⏸ 정지";
  playLoopStep();
}
function stopLoop(){ loopOn=false; stopSpeak(); const b=$("#loopToggle"); if(b)b.textContent="▶ 재생"; const t=$("#loopText"); if(t)t.textContent="⏸ 정지됨"; }
function playLoopStep(){
  if(!loopOn) return;
  if(loopPtr>=loopItems.length) loopPtr=0;
  const it=loopItems[loopPtr];
  const tx=$("#loopText"); if(tx) tx.textContent=it.t;
  speak(it.t, it.l, state.loopRate, ()=>{
    if(!loopOn)return;
    loopPtr++;
    setTimeout(()=>playLoopStep(), (state.loopGap||0.6)*1000);
  });
}

      <label class="fl">간단버전(세뇌루프)</label><textarea data-c="${i}" data-f="simple">${cf(i,"simple")}</textarea>
      <label class="fl">왜</label><textarea data-c="${i}" data-f="why">${cf(i,"why")}</textarea>
      <label class="fl">골격(쉼표로 구분)</label><input data-c="${i}" data-f="skel" value="${(cf(i,"skel")||[]).join(", ").replace(/"/g,'&quot;')}">
      <label class="fl">하지말것</label><textarea data-c="${i}" data-f="donot">${cf(i,"donot")}</textarea>`;
    v.appendChild(det);
  });

  // wire saving
  v.querySelectorAll("[data-c]").forEach(el=>el.onchange=()=>{
    const i=el.dataset.c, f=el.dataset.f; let val=el.value;
    if(f==="skel") val=val.split(",").map(s=>s.trim()).filter(Boolean);
    setOv(state.co,"cards."+i+"."+f, val); toast("저장됨");
  });
  v.querySelectorAll("[data-intro]").forEach(el=>el.onchange=()=>{ setOv(state.co,"intro."+el.dataset.intro+".t", el.value); toast("저장됨"); });
  v.querySelectorAll("[data-fact]").forEach(el=>el.onchange=()=>{ setOv(state.co,"fact."+el.dataset.fact, el.value); toast("저장됨"); });
  $("#exp").onclick=()=>{ const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="면접코치_백업.json"; a.click(); };
  $("#imp").onclick=()=>$("#impFile").click();
  $("#impFile").onchange=e=>{ const fr=new FileReader(); fr.onload=()=>{ try{ state=JSON.parse(fr.result); saveState(); toast("불러옴"); render(); }catch(err){toast("파일 오류");} }; fr.readAsText(e.target.files[0]); };
  $("#rst").onclick=()=>{ if(confirm("편집·진도를 모두 기본값으로 초기화할까요?")){ localStorage.removeItem(LS_KEY); state=loadState(); state.co="dnotitia";state.mode="edit";state.srs={};state.edits={};state.idx={}; saveState(); render(); toast("초기화됨"); } };
}

/* ---------- recording ---------- */
let mediaRec=null, chunksRec=[];
function setupRec(btn){
  if(!btn) return;
  btn.onclick=async()=>{
    if(mediaRec && mediaRec.state==="recording"){ mediaRec.stop(); btn.textContent="🎙️ 녹음"; return; }
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      mediaRec=new MediaRecorder(stream); chunksRec=[];
      mediaRec.ondataavailable=e=>chunksRec.push(e.data);
      mediaRec.onstop=()=>{ const blob=new Blob(chunksRec,{type:"audio/webm"}); const url=URL.createObjectURL(blob);
        let au=$("#myrec"); if(!au){ au=document.createElement("audio"); au.id="myrec"; au.controls=true; au.style="width:100%;margin-top:8px"; btn.parentNode.appendChild(au);} au.src=url;
        stream.getTracks().forEach(t=>t.stop()); };
      mediaRec.start(); btn.textContent="⏹ 정지";
    }catch(e){ toast("마이크 권한 필요"); }
  };
}
